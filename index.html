<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>CLEARPATH TRADER | Institutional Intelligence Terminal</title>
    <meta name="description" content="Premium institutional financial intelligence interface and market research terminal. High-fidelity data visualization and analysis for professional market participants." />
    <meta name="keywords" content="trading, institutional data, market intelligence, clearpath trader, financial terminal, neural intelligence" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4D00FF" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ClearPath Trader" />
    <link rel="apple-touch-icon" href="https://api.dicebear.com/7.x/shapes/svg?seed=clearpath&backgroundColor=4D00FF" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  </head>
  <body>
    <div id="root">
      <div style="height: 100vh; width: 100vw; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; font-family: monospace; font-weight: 900; text-transform: uppercase; letter-spacing: 4px; font-size: 10px;">
        <span style="opacity: 0.5; margin-right: 10px;">[</span> 
        <div id="loader-text">ClearPath Intelligence</div> 
        <span style="opacity: 0.5; margin-left: 10px;">]</span>
      </div>
    </div>
    <script>
      // Global failsafe to show errors if React fails to mount
      window.onerror = function(msg, url, line, col, error) {
        var loaderText = document.getElementById('loader-text');
        if (loaderText) {
          loaderText.innerHTML = '<span style="color: #ff4500">Initialization Error</span>';
          loaderText.style.letterSpacing = '1px';
          console.error('LAVA CRITICAL:', msg, 'at', url, ':', line);
        }
        return false;
      };
      window.onunhandledrejection = function(event) {
        var loaderText = document.getElementById('loader-text');
        if (loaderText) {
          loaderText.innerHTML = '<span style="color: #ff4500">Pipeline Rejection</span>';
        }
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
